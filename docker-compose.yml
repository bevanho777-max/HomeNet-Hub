services:
  homenet-hub:
    build: .
    container_name: homenet-hub
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - PG_DSN=${PG_DSN:-}                # read-only token DB (optional; demo needs none)
      - PUSH_TOKEN_GPU1=${PUSH_TOKEN_GPU1:-} # http_push shared secret (optional)
      - PUSH_TOKEN_M26=${PUSH_TOKEN_M26:-}   # machine 26 push agent
      - PUSH_TOKEN_M25=${PUSH_TOKEN_M25:-}   # machine 25 push agent
      - PUSH_TOKEN_M110=${PUSH_TOKEN_M110:-}  # machine 110 push agent
      - PUSH_TOKEN_M24=${PUSH_TOKEN_M24:-}   # machine 24 self-monitor agent
      - PUSH_TOKEN_M27=${PUSH_TOKEN_M27:-}   # machine 27 push agent
    volumes:
      - ./config:/app/config:ro          # YAML config, read-only mount (edit on host → chokidar hot-reload)
      - ./data:/app/data                 # SQLite timeseries volume (persisted)
    extra_hosts: []                      # LAN direct, nothing special
    networks:
      - default
      - litellm

networks:
  litellm:
    external: true
    name: litellm_default
